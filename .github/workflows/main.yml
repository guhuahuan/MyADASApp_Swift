name: iOS Build Test

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build with xcodebuild
        run: |
          # 关键：直接在根目录运行，不指定特定 scheme，让它解析 Package.swift
          xcodebuild build \
            -sdk iphonesimulator \
            -arch arm64 \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
