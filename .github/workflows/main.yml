name: ADAS-Simple-Build-v2

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build Unsigned App
        run: |
          # 1. 自动获取 Scheme
          SCHEME_NAME=$(xcodebuild -list -json | jq -r '.workspace.schemes[0] // .project.schemes[0]')
          echo "Detected Scheme: $SCHEME_NAME"
          
          # 2. 编译到默认派生数据目录 (DerivedData)，这在云端更稳定
          xcodebuild build \
            -scheme "$SCHEME_NAME" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath ./DerivedData

      - name: Create IPA Container
        run: |
          # 3. 在编译输出中深度搜索 .app 文件夹
          # 排除模拟器产物，只找真机 (iphoneos) 的产物
          APP_PATH=$(find ./DerivedData -name "*.app" | grep "Release-iphoneos" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "错误：未找到编译生成的 .app 文件！"
            find ./DerivedData -name "*.app" # 列出所有找到的，方便排查
            exit 1
          fi
          
          echo "Found App at: $APP_PATH"
          
          # 4. 封装 IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r MyADAS_Simple.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyADAS-Simple-IPA
          path: MyADAS_Simple.ipa
