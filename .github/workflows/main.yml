name: FSD V6.0 VERTICAL PRODUCTION BUILD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Info.plist
        run: |
          cat <<EOF > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>MyADASApp_Swift</string>
              <key>CFBundleIdentifier</key><string>com.fsd.v6.master</string>
              <key>CFBundleName</key><string>FSD MASTER</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>6.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>MinimumOSVersion</key><string>17.0</string>
              <key>NSCameraUsageDescription</key><string>需要访问相机以进行实时道路目标检测和前车碰撞预警。</string>
              <key>NSLocationWhenInUseUsageDescription</key><string>需要访问位置信息以计算实时行驶速度和地理航向。</string>
              <key>NSMotionUsageDescription</key><string>需要访问陀螺仪数据以实现 3D 轨迹线的动态姿态补偿。</string>
              <key>UISupportedInterfaceOrientations</key>
              <array><string>UIInterfaceOrientationPortrait</string></array>
              <key>UILaunchScreen</key><dict/>
          </dict>
          </plist>
          EOF

      - name: Build Swift Binary
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          swift build -c release \
            --triple arm64-apple-ios17.0 \
            -Xswiftc -sdk -Xswiftc "$SDK_PATH" \
            -Xcc -isysroot -Xcc "$SDK_PATH" \
            -Xlinker -sectcreate -Xlinker __TEXT -Xlinker __info_plist -Xlinker Info.plist

      - name: Compile and Assemble IPA
        run: |
          # 1. 准备目录
          rm -rf Payload
          mkdir -p Payload/MyADASApp_Swift.app
          
          # 2. 拷贝二进制
          BIN=$(find .build -type f -name "MyADASApp_Swift" | grep "release" | head -n 1)
          cp "$BIN" Payload/MyADASApp_Swift.app/MyADASApp_Swift
          chmod +x Payload/MyADASApp_Swift.app/MyADASApp_Swift
          
          # 3. 模型编译逻辑 (保持你之前的有效修复)
          SRC_PACKAGE="Sources/yolov8l.mlpackage"
          
          if [ ! -d "$SRC_PACKAGE" ]; then
            echo "❌ CRITICAL: Cannot find $SRC_PACKAGE"
            exit 1
          fi
          
          echo "🚀 Compiling MLPackage from $SRC_PACKAGE ..."
          xcrun coremlcompiler compile "$SRC_PACKAGE" Payload/MyADASApp_Swift.app/
          
          # 检查并统一模型目录名称
          FOUND_C=$(find Payload/MyADASApp_Swift.app -name "*.mlmodelc" -type d | head -n 1)
          if [ "$FOUND_C" != "Payload/MyADASApp_Swift.app/yolov8l.mlmodelc" ]; then
             mv "$FOUND_C" Payload/MyADASApp_Swift.app/yolov8l.mlmodelc
          fi
          
          # 4. 补充配置
          cp Info.plist Payload/MyADASApp_Swift.app/
          
          # 5. 打包
          zip -r FSD_V6_Production.ipa Payload
          echo "Final Package Size: $(du -sh FSD_V6_Production.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FSD-V6-Production-IPA
          path: FSD_V6_Production.ipa
