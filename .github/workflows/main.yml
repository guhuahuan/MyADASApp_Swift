name: FSD V4.0 PRODUCTION MASTER BUILD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Info.plist
        run: |
          cat <<EOF > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>MyADASApp_Swift</string>
              <key>CFBundleIdentifier</key><string>com.fsd.v4.master</string>
              <key>CFBundleName</key><string>FSD MASTER</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>4.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>MinimumOSVersion</key><string>17.0</string>
              <key>NSCameraUsageDescription</key><string>道路环境感知</string>
              <key>NSLocationWhenInUseUsageDescription</key><string>速度计算</string>
              <key>NSMotionUsageDescription</key><string>AR修正</string>
              <key>UISupportedInterfaceOrientations</key>
              <array><string>UIInterfaceOrientationLandscapeRight</string></array>
              <key>UIInterfaceOrientation</key><string>UIInterfaceOrientationLandscapeRight</string>
              <key>UILaunchScreen</key><dict/>
          </dict>
          </plist>
          EOF

      - name: Build Swift Binary
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          swift build -c release \
            --triple arm64-apple-ios17.0 \
            -Xswiftc -sdk -Xswiftc "$SDK_PATH" \
            -Xcc -isysroot -Xcc "$SDK_PATH" \
            -Xlinker -sectcreate -Xlinker __TEXT -Xlinker __info_plist -Xlinker Info.plist

      - name: Compile and Assemble IPA
        run: |
          # 1. 准备目录
          rm -rf Payload
          mkdir -p Payload/MyADASApp_Swift.app
          
          # 2. 拷贝二进制
          BIN=$(find .build -type f -name "MyADASApp_Swift" | grep "release" | head -n 1)
          cp "$BIN" Payload/MyADASApp_Swift.app/MyADASApp_Swift
          chmod +x Payload/MyADASApp_Swift.app/MyADASApp_Swift
          
          # 3. 【关键修复】直接指向你的 .mlpackage 路径
          # 根据你的 ls 输出，路径是 Sources/yolov8l.mlpackage
          SRC_PACKAGE="Sources/yolov8l.mlpackage"
          
          if [ ! -d "$SRC_PACKAGE" ]; then
            echo "❌ CRITICAL: Cannot find $SRC_PACKAGE"
            exit 1
          fi
          
          echo "🚀 Compiling MLPackage from $SRC_PACKAGE ..."
          
          # 4. 编译模型并强制输出为代码需要的 yolov8l.mlmodelc
          xcrun coremlcompiler compile "$SRC_PACKAGE" Payload/MyADASApp_Swift.app/
          
          # 检查编译结果。编译器通常会在目标目录下生成 yolov8l.mlmodelc
          if [ -d "Payload/MyADASApp_Swift.app/yolov8l.mlmodelc" ]; then
             echo "✅ Model successfully compiled into App Bundle."
          else
             echo "⚠️ Renaming output if needed..."
             # 有些版本可能生成名称不一致，强制修正
             FOUND_C=$(find Payload/MyADASApp_Swift.app -name "*.mlmodelc" -type d | head -n 1)
             mv "$FOUND_C" Payload/MyADASApp_Swift.app/yolov8l.mlmodelc
          fi
          
          # 5. 补充配置
          cp Info.plist Payload/MyADASApp_Swift.app/
          
          # 6. 打包
          zip -r FSD_V4_Production.ipa Payload
          echo "Final Package Size: $(du -sh FSD_V4_Production.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FSD-V4-Production-IPA
          path: FSD_V4_Production.ipa
