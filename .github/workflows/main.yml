name: Build FSD V4 ADAS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Create Info.plist
        run: |
          cat <<EOF > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>NSCameraUsageDescription</key><string>用于AI实时识别路况</string>
              <key>NSLocationWhenInUseUsageDescription</key><string>用于计算行驶速度</string>
              <key>NSMotionUsageDescription</key><string>用于3D路径姿态修正</string>
              <key>CFBundleExecutable</key><string>MyADASApp_Swift</string>
              <key>CFBundleIdentifier</key><string>com.fsd.v4.adas</string>
              <key>CFBundleName</key><string>FSD V4 ADAS</string>
              <key>UILaunchScreen</key><dict/>
          </dict>
          </plist>
          EOF

      - name: Build for iPhone Device
        run: |
          # 1. 清理缓存
          swift package clean
          
          # 2. 导出关键环境变量，强制 Clang 使用 iOS SDK
          export SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "Target SDKROOT: $SDKROOT"
          
          # 3. 强制编译命令
          # -Xcc -isysroot 是为了封死 C 编译器的头文件搜索路径
          # -Xcc --target 是为了确保底层的模块映射正确
          swift build -c release \
            --triple arm64-apple-ios17.0 \
            -Xswiftc -sdk -Xswiftc "$SDKROOT" \
            -Xcc -isysroot -Xcc "$SDKROOT" \
            -Xcc --target=arm64-apple-ios17.0 \
            -Xlinker -sectcreate -Xlinker __TEXT -Xlinker __info_plist -Xlinker Info.plist
            
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FSD-ADAS-Binary
          path: .build/arm64-apple-ios17.0/release/MyADASApp_Swift
