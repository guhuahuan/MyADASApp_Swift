name: ADAS-Simple-Build

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: List Schemes (Debug Info)
        run: xcodebuild -list

      - name: Build Unsigned App
        run: |
          # 自动获取第一个可用的 Scheme，避免手动输入错误
          SCHEME_NAME=$(xcodebuild -list -json | jq -r '.workspace.schemes[0] // .project.schemes[0]')
          echo "Detected Scheme: $SCHEME_NAME"
          
          # 针对真机编译
          xcodebuild build \
            -scheme "$SCHEME_NAME" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CONFIGURATION_BUILD_DIR=build_output

      - name: Create IPA Container
        run: |
          mkdir -p Payload
          # 寻找生成的 .app 文件夹并放入 Payload
          # 如果有多个 .app，只取第一个
          APP_PATH=$(find build_output -name "*.app" -maxdepth 1 | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r MyADAS_Simple.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyADAS-Simple-IPA
          path: MyADAS_Simple.ipa
