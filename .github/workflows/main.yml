name: iOS Build Test

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build for Simulator
        run: |
          # 使用 xcodebuild 直接构建 Swift Package
          # -scheme: 默认与你的 Package 名称一致
          # -destination: 指定为 iOS 模拟器
          xcodebuild build \
            -scheme MyADASApp_Swift \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath build
