name: Build FSD V4 ADAS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Info.plist
        run: |
          # 创建权限声明文件
          echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict>
            <key>NSCameraUsageDescription</key><string>AI识别路况</string>
            <key>NSLocationWhenInUseUsageDescription</key><string>计算车速</string>
            <key>NSMotionUsageDescription</key><string>路径姿态修正</string>
          </dict></plist>' > Info.plist

      - name: Build for Real iPhone
        run: |
          # 动态获取真机 SDK 路径
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # 核心构建命令：指向真机 arm64 架构，并注入权限
          swift build -c release --triple arm64-apple-ios17.0 \
            -Xswiftc -sdk -Xswiftc "$SDK_PATH" \
            -Xlinker -sectcreate -Xlinker __TEXT -Xlinker __info_plist -Xlinker Info.plist
            
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: FSD-ADAS-Binary
          path: .build/arm64-apple-ios17.0/release/MyADASApp_Swift
