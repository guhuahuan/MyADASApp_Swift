name: FSD V4.0 HORIZONTAL MASTER BUILD

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 支持手动触发构建

jobs:
  build:
    runs-on: macos-14 # 使用最新的 macOS 运行环境以支持 iOS 17 SDK

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true # 如果你的 mlmodelc 很大，确保开启 LFS

      - name: Create Full Spec Info.plist
        run: |
          cat <<EOF > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>MyADASApp_Swift</string>
              <key>CFBundleIdentifier</key><string>com.fsd.v4.master</string>
              <key>CFBundleName</key><string>FSD MASTER</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>4.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>MinimumOSVersion</key><string>17.0</string>
              
              <key>NSCameraUsageDescription</key><string>需要相机进行 AI 道路环境感知与碰撞检测</string>
              <key>NSLocationWhenInUseUsageDescription</key><string>需要 GPS 数据计算实时车速与航向</string>
              <key>NSMotionUsageDescription</key><string>需要陀螺仪数据进行 3D 轨迹 AR 姿态修正代</string>
              
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UIInterfaceOrientation</key>
              <string>UIInterfaceOrientationLandscapeRight</string>

              <key>UILaunchScreen</key><dict/>
          </dict>
          </plist>
          EOF

      - name: Setup Swift & SDK Path
        run: |
          sudo xcode-select -s /Applications/Xcode_15.3.app
          echo "SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)" >> $GITHUB_ENV

      - name: Compile Swift for iOS (Arm64)
        run: |
          swift build -c release \
            --triple arm64-apple-ios17.0 \
            -Xswiftc -sdk -Xswiftc ${{ env.SDK_PATH }} \
            -Xcc -isysroot -Xcc ${{ env.SDK_PATH }} \
            -Xlinker -sectcreate -Xlinker __TEXT -Xlinker __info_plist -Xlinker Info.plist

      - name: Assemble IPA (The Production Bundle)
        run: |
          # 1. 创建 App 包目录
          rm -rf Payload
          mkdir -p Payload/MyADASApp_Swift.app
          
          # 2. 拷贝二进制文件
          BIN_PATH=$(find .build -type f -name "MyADASApp_Swift" | grep "release" | head -n 1)
          cp "$BIN_PATH" Payload/MyADASApp_Swift.app/MyADASApp_Swift
          chmod +x Payload/MyADASApp_Swift.app/MyADASApp_Swift
          
          # 3. 拷贝编译好的 CoreML 模型 (.mlmodelc)
          # 假设你的模型在项目根目录或已编译目录
          find . -name "*.mlmodelc" -exec cp -r {} Payload/MyADASApp_Swift.app/ \;
          
          # 4. 拷贝 Info.plist
          cp Info.plist Payload/MyADASApp_Swift.app/
          
          # 5. 打包成 IPA
          zip -r FSD_V4_Horizontal.ipa Payload

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FSD-V4-Master-IPA
          path: FSD_V4_Horizontal.ipa
