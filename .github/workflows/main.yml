name: Build MyADASApp IPA (Direct Extraction)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15 # 必须用 15 来支持你的 Swift 6 代码
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Force Build (Skip Archive)
        run: |
          # 这一步只编译，不进行严格的 Archive 归档，从而避开 SDK 18 的缺失检查
          xcodebuild build \
            -scheme MyADASApp_Swift \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COREML_CODEGEN_LANGUAGE=Swift \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package to IPA
        run: |
          mkdir -p Payload
          
          # 直接进入编译缓存目录把生成的包拎出来
          APP_PATH=$(find ./DerivedData -name "*.app" -type d | grep "Release-iphoneos" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "错误：编译产物中找不到 .app 文件！"
            # 最后的倔强：列出所有文件看看编译器到底把包塞哪了
            find ./DerivedData -name "*.app" -type d
            exit 1
          fi
          
          echo "捕获到编译产物: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -vr MyADASApp.ipa Payload/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyADASApp-v1.0-FastBuild
          path: MyADASApp.ipa
