name: iOS Build Test

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build for Simulator
        run: |
          # 使用 xcodebuild 自动处理所有 SDK 路径
          # 我们指定 destination 为模拟器，这样不需要配置 P12 证书也能编译成功
          xcodebuild -command-line-tool-sdk iphonesimulator \
            -arch arm64 \
            -sdk iphonesimulator \
            -derivedDataPath build \
            OTHER_SWIFT_FLAGS="-D SKIP_CAMERA" # 预留标记
