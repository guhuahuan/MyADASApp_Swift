name: FSD V4.0 PRODUCTION MASTER BUILD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Info.plist
        run: |
          cat <<EOF > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>MyADASApp_Swift</string>
              <key>CFBundleIdentifier</key><string>com.fsd.v4.master</string>
              <key>CFBundleName</key><string>FSD MASTER</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>4.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>MinimumOSVersion</key><string>17.0</string>
              <key>NSCameraUsageDescription</key><string>AI道路检测</string>
              <key>NSLocationWhenInUseUsageDescription</key><string>速度计算</string>
              <key>NSMotionUsageDescription</key><string>AR补偿</string>
              <key>UISupportedInterfaceOrientations</key>
              <array><string>UIInterfaceOrientationLandscapeRight</string></array>
              <key>UILaunchScreen</key><dict/>
          </dict>
          </plist>
          EOF

      - name: Build Swift Binary
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          swift build -c release \
            --triple arm64-apple-ios17.0 \
            -Xswiftc -sdk -Xswiftc "$SDK_PATH" \
            -Xcc -isysroot -Xcc "$SDK_PATH" \
            -Xlinker -sectcreate -Xlinker __TEXT -Xlinker __info_plist -Xlinker Info.plist

      - name: Compile and Assemble IPA (Robust Logic)
        run: |
          # 1. 初始化目录
          rm -rf Payload
          mkdir -p Payload/MyADASApp_Swift.app
          
          # 2. 拷贝二进制文件
          BIN=$(find .build -type f -name "MyADASApp_Swift" | grep "release" | head -n 1)
          cp "$BIN" Payload/MyADASApp_Swift.app/MyADASApp_Swift
          chmod +x Payload/MyADASApp_Swift.app/MyADASApp_Swift
          
          # 3. 动态寻找并编译模型
          RAW_MODEL=$(find . -name "*.mlmodel" | head -n 1)
          if [ -z "$RAW_MODEL" ]; then
            echo "❌ Error: No .mlmodel found in repo!"
            exit 1
          fi
          
          echo "🚀 Compiling $RAW_MODEL ..."
          # 编译到临时目录
          mkdir -p temp_model
          xcrun coremlcompiler compile "$RAW_MODEL" temp_model/
          
          # 4. 关键步骤：找到编译产物并重命名为代码指定的 yolov8l.mlmodelc
          COMPILED_MODEL=$(find temp_model -name "*.mlmodelc" -type d | head -n 1)
          if [ -n "$COMPILED_MODEL" ]; then
            cp -r "$COMPILED_MODEL" Payload/MyADASApp_Swift.app/yolov8l.mlmodelc
            echo "✅ Model successfully integrated as yolov8l.mlmodelc"
          else
            echo "❌ Error: Compilation failed, no .mlmodelc generated!"
            exit 1
          fi
          
          # 5. 拷贝 Info.plist
          cp Info.plist Payload/MyADASApp_Swift.app/
          
          # 6. 打包
          zip -r FSD_V4_Production.ipa Payload
          ls -lh FSD_V4_Production.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FSD-V4-Production-IPA
          path: FSD_V4_Production.ipa
