name: Build MyADASApp IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15 # 必须用 macos-15 才能支持 Swift 6.0
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build Archive
        run: |
          mkdir -p build
          # 核心改动：
          # 1. 移除具体的 -sdk 指定，让它走默认路径
          # 2. 移除具体的 -destination 限制，改用更宽泛的构建参数
          xcodebuild archive \
            -scheme MyADASApp_Swift \
            -destination "generic/platform=iOS" \
            -archivePath ./build/MyADASApp.xcarchive \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COREML_CODEGEN_LANGUAGE=Swift \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            clean

      - name: Create IPA (TrollStore Compatible)
        run: |
          mkdir -p Payload
          
          # 查找 .app 的逻辑增加多重保障
          # 路径 A: 标准 Archive 路径
          APP_PATH=$(find ./build/MyADASApp.xcarchive/Products -name "*.app" -type d | head -n 1)
          
          # 路径 B: 如果路径 A 找不到，去 DerivedData 捞
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ./DerivedData -name "*.app" -type d | grep "Release-iphoneos" | head -n 1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "错误：依然无法找到 .app 文件！"
            find . -name "*.app" -type d
            exit 1
          fi
          
          echo "成功定位包体: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -vr MyADASApp.ipa Payload/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyADASApp-Final
          path: MyADASApp.ipa
