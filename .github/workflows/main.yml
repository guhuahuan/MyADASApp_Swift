name: Build MyADASApp IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 # 切换到 macos-14，环境更稳，包含完整的 iOS 17 SDK
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Archive
        run: |
          mkdir -p build
          # 使用最稳妥的 iOS 17 SDK 进行真机归档
          xcodebuild archive \
            -scheme MyADASApp_Swift \
            -destination "generic/platform=iOS" \
            -archivePath ./build/MyADASApp.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COREML_CODEGEN_LANGUAGE=Swift \
            clean

      - name: Create IPA (TrollStore Compatible)
        run: |
          mkdir -p Payload
          # 检查 Products 目录，这是 Archive 成功的标志
          if [ -d "./build/MyADASApp.xcarchive/Products/usr/local/bin" ]; then
            # 针对 SwiftPM 项目的特殊路径处理
            APP_NAME=$(ls ./build/MyADASApp.xcarchive/Products/usr/local/bin | head -n 1)
            cp -r "./build/MyADASApp.xcarchive/Products/usr/local/bin/$APP_NAME" Payload/
          else
            # 尝试标准路径
            APP_PATH=$(find ./build/MyADASApp.xcarchive -name "*.app" -type d | head -n 1)
            cp -r "$APP_PATH" Payload/
          fi
          
          zip -vr MyADASApp.ipa Payload/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyADASApp-v1.0
          path: MyADASApp.ipa
