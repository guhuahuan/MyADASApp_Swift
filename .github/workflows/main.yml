name: FSD V4.0 PRODUCTION MASTER BUILD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true # 关键修补：必须拉取模型大文件

      - name: Setup Info.plist (ADAS 规格)
        run: |
          cat <<EOF > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>MyADASApp_Swift</string>
              <key>CFBundleIdentifier</key><string>com.fsd.v4.master</string>
              <key>CFBundleName</key><string>FSD MASTER</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>4.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>MinimumOSVersion</key><string>17.0</string>
              
              <key>NSCameraUsageDescription</key><string>需要相机进行实时道路环境感知与碰撞预警</string>
              <key>NSLocationWhenInUseUsageDescription</key><string>需要 GPS 数据计算实时车速与航向</string>
              <key>NSMotionUsageDescription</key><string>需要陀螺仪数据进行 3D 引导轨迹 AR 修正代</string>
              
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UIInterfaceOrientation</key>
              <string>UIInterfaceOrientationLandscapeRight</string>
              
              <key>UILaunchScreen</key><dict/>
          </dict>
          </plist>
          EOF

      - name: Swift Build
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          swift build -c release \
            --triple arm64-apple-ios17.0 \
            -Xswiftc -sdk -Xswiftc "$SDK_PATH" \
            -Xcc -isysroot -Xcc "$SDK_PATH" \
            -Xlinker -sectcreate -Xlinker __TEXT -Xlinker __info_plist -Xlinker Info.plist

      - name: 组装与校验 IPA ( Robust Logic )
        run: |
          # 1. 初始化
          rm -rf Payload
          mkdir -p Payload/MyADASApp_Swift.app
          
          # 2. 拷贝二进制
          BIN=$(find .build -type f -name "MyADASApp_Swift" | grep "release" | head -n 1)
          cp "$BIN" Payload/MyADASApp_Swift.app/MyADASApp_Swift
          chmod +x Payload/MyADASApp_Swift.app/MyADASApp_Swift
          
          # 3. 【核心修复】强制更名编译路径以适配代码
          # 代码寻找 yolov8l.mlmodelc。CI环境寻找任何编译后的文件。
          MODEL=$(find . -name "*.mlmodelc" -type d | head -n 1)
          if [ -n "$MODEL" ]; then
            cp -r "$MODEL" Payload/MyADASApp_Swift.app/yolov8l.mlmodelc
          else
            echo "❌ Error: 模型未找到。检查 LFS 状态！"
            exit 1
          fi
          
          # 4. 拷贝权限文件
          cp Info.plist Payload/MyADASApp_Swift.app/
          
          # 5. 打包成 IPA 并输出最终体积
          zip -r FSD_V4_Horizontal.ipa Payload
          ls -lh FSD_V4_Horizontal.ipa # 关键修补：显示体积，它必须 > 30MB
