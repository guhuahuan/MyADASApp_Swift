name: FSD V6.0 PRODUCTION BUILD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Info.plist
        run: |
          cat <<EOF > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>MyADASApp_Swift</string>
              <key>CFBundleIdentifier</key><string>com.fsd.v6.master</string>
              <key>CFBundleName</key><string>FSD MASTER</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>6.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>MinimumOSVersion</key><string>17.0</string>
              <key>NSCameraUsageDescription</key><string>需要访问相机以进行实时的人员与车辆检测。</string>
              <key>UILaunchScreen</key><dict/>
              <key>UISupportedInterfaceOrientations</key>
              <array><string>UIInterfaceOrientationPortrait</string></array>
          </dict>
          </plist>
          EOF

      - name: Build Binary
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          swift build -c release --triple arm64-apple-ios17.0 \
            -Xswiftc -sdk -Xswiftc "$SDK_PATH" \
            -Xcc -isysroot -Xcc "$SDK_PATH" \
            -Xlinker -sectcreate -Xlinker __TEXT -Xlinker __info_plist -Xlinker Info.plist

      - name: Assemble IPA
        run: |
          # 1. 准备目录
          mkdir -p Payload/MyADASApp_Swift.app
          
          # 2. 拷贝二进制
          BIN=$(find .build -type f -name "MyADASApp_Swift" | grep "release" | head -n 1)
          cp "$BIN" Payload/MyADASApp_Swift.app/MyADASApp_Swift
          chmod +x Payload/MyADASApp_Swift.app/MyADASApp_Swift
          
          # 3. 核心：编译 yolo26x 模型
          SRC_PACKAGE="Sources/yolo26x.mlpackage"
          xcrun coremlcompiler compile "$SRC_PACKAGE" Payload/MyADASApp_Swift.app/
          
          # 4. 统一名称以便代码调用 (增加安全判断，防范自移动报错)
          FOUND_C=$(find Payload/MyADASApp_Swift.app -name "*.mlmodelc" -type d | head -n 1)
          TARGET_C="Payload/MyADASApp_Swift.app/yolo26x.mlmodelc"
          
          if [ -d "$FOUND_C" ] && [ "$FOUND_C" != "$TARGET_C" ]; then
              echo "🔄 Renaming $FOUND_C to $TARGET_C"
              mv "$FOUND_C" "$TARGET_C"
          else
              echo "✅ Model is already named correctly or not found."
          fi
          
          # 5. 补充配置与打包
          cp Info.plist Payload/MyADASApp_Swift.app/
          zip -r FSD_Production.ipa Payload
          echo "Final Package Size: $(du -sh FSD_Production.ipa)"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FSD-Production-IPA
          path: FSD_Production.ipa
