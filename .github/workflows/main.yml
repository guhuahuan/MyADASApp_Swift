name: FSD V4.0 PRODUCTION MASTER BUILD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Info.plist
        run: |
          cat <<EOF > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>MyADASApp_Swift</string>
              <key>CFBundleIdentifier</key><string>com.fsd.v4.master</string>
              <key>CFBundleName</key><string>FSD MASTER</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>4.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>MinimumOSVersion</key><string>17.0</string>
              <key>NSCameraUsageDescription</key><string>AI道路环境感知</string>
              <key>NSLocationWhenInUseUsageDescription</key><string>实时车速计算</string>
              <key>NSMotionUsageDescription</key><string>3D轨迹AR修正</string>
              <key>UISupportedInterfaceOrientations</key>
              <array><string>UIInterfaceOrientationLandscapeRight</string></array>
              <key>UILaunchScreen</key><dict/>
          </dict>
          </plist>
          EOF

      - name: Build Swift Binary
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          swift build -c release \
            --triple arm64-apple-ios17.0 \
            -Xswiftc -sdk -Xswiftc "$SDK_PATH" \
            -Xcc -isysroot -Xcc "$SDK_PATH" \
            -Xlinker -sectcreate -Xlinker __TEXT -Xlinker __info_plist -Xlinker Info.plist

      - name: Compile and Assemble IPA
        run: |
          # 1. 初始化
          rm -rf Payload
          mkdir -p Payload/MyADASApp_Swift.app
          
          # 2. 拷贝二进制
          BIN=$(find .build -type f -name "MyADASApp_Swift" | grep "release" | head -n 1)
          cp "$BIN" Payload/MyADASApp_Swift.app/MyADASApp_Swift
          chmod +x Payload/MyADASApp_Swift.app/MyADASApp_Swift
          
          # 3. 【核心修正】寻找源码模型，排除 .build 目录
          # 使用 -not -path 排除掉中间缓存文件
          RAW_MODEL=$(find . -name "*.mlmodel" -not -path "./.build/*" | head -n 1)
          
          if [ -z "$RAW_MODEL" ]; then
            echo "❌ Error: Source .mlmodel not found! Check your repo root."
            exit 1
          fi
          
          echo "🚀 Compiling source model: $RAW_MODEL"
          
          # 4. 编译模型并强制输出到目标位置
          # 我们直接编译到 App 包内，并确保它叫 yolov8l.mlmodelc
          mkdir -p temp_compile
          xcrun coremlcompiler compile "$RAW_MODEL" temp_compile/
          
          # 找到编译后的文件夹并拷贝，改名为代码需要的名称
          COMPILED_FOLDER=$(find temp_compile -name "*.mlmodelc" -type d | head -n 1)
          cp -r "$COMPILED_FOLDER" Payload/MyADASApp_Swift.app/yolov8l.mlmodelc
          
          # 5. 补充 Info.plist
          cp Info.plist Payload/MyADASApp_Swift.app/
          
          # 6. 最终打包
          zip -r FSD_V4_Production.ipa Payload
          echo "--- BUILD SUCCESS ---"
          ls -lh FSD_V4_Production.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FSD-V4-Production-IPA
          path: FSD_V4_Production.ipa
