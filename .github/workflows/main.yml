name: iOS Build Test

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build for Simulator
        run: |
          # 使用通用的 iOS Simulator 占位符
          xcodebuild build \
            -scheme MyADASApp_Swift \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO
