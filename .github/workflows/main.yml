name: ADAS-Global-Final-Fix

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app
          # 关键 1: 强制执行 Xcode 首次启动初始化
          sudo xcodebuild -runFirstLaunch

      - name: Wake Up Simulator Service
        run: |
          # 关键 2: 唤醒并列出模拟器，防止 CoreML 编译时找不到服务
          xcrun simctl list
          # 尝试下载平台（如果没下载的话），增加重试机制
          xcodebuild -downloadPlatform iOS || true

      - name: Prepare Workspace
        run: |
          mkdir -p ModelTemp
          if [ -d "Sources/yolov8s.mlpackage" ]; then
            mv Sources/yolov8s.mlpackage ModelTemp/
          fi
          find Sources -name "MyADASApp.swift" -delete

      - name: Build and Archive
        run: |
          # 关键 3: 明确指定 SDK 为 iphoneos，并增加超时容忍
          SCHEME_NAME=$(xcodebuild -list -json | jq -r '.workspace.schemes[0] // .project.schemes[0]')
          
          xcodebuild archive \
            -scheme "$SCHEME_NAME" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/MyADAS.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_OPTIMIZATION_LEVEL=-Onone

      - name: Package IPA
        run: |
          mkdir -p Payload/MyADASApp.app
          BINARY_PATH=$(find ./build/MyADAS.xcarchive/Products -type f -perm +111 | grep ".app/" | head -n 1)
          cp "$BINARY_PATH" Payload/MyADASApp.app/MyADASApp
          
          # 编译模型
          if [ -d "ModelTemp/yolov8s.mlpackage" ]; then
            xcrun coremlc compile ModelTemp/yolov8s.mlpackage Payload/MyADASApp.app/
          fi
          
          # 生成 Info.plist
          cat <<EOF > Payload/MyADASApp.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key> <string>MyADASApp</string>
              <key>CFBundleIdentifier</key> <string>com.adas.global.system</string>
              <key>CFBundleName</key> <string>GlobalADAS</string>
              <key>CFBundlePackageType</key> <string>APPL</string>
              <key>CFBundleShortVersionString</key> <string>1.0</string>
              <key>CFBundleVersion</key> <string>1</string>
              <key>LSRequiresIPhoneOS</key> <true/>
              <key>NSCameraUsageDescription</key> <string>需要摄像头进行交通风险预判</string>
              <key>UILaunchScreen</key> <dict/>
              <key>MinimumOSVersion</key> <string>17.0</string>
          </dict>
          </plist>
          EOF
          
          zip -r Global_ADAS_System.ipa Payload

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: ADAS-iPhone-Build
          path: Global_ADAS_System.ipa
