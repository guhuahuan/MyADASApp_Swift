name: Build MyADASApp (iOS 26 Hardcore Mode)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Hardcore Compilation
        run: |
          # 1. 查找 SDK 路径
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # 2. 直接调用编译器，强行链接 iOS 标准库
          # 这样能绕过所有 Project/Scheme 的环境检查
          swiftc -o MyADASApp_Binary \
            -target arm64-apple-ios17.0 \
            -sdk "$SDK_PATH" \
            Sources/*.swift \
            -O -whole-module-optimization

      - name: Assemble .app for TrollStore
        run: |
          mkdir -p MyADASApp.app
          
          # 移动二进制文件并赋予执行权限
          mv MyADASApp_Binary MyADASApp.app/MyADASApp
          chmod +x MyADASApp.app/MyADASApp
          
          # 创建必要的 Info.plist (TrollStore 需要它来识别入口)
          cat <<EOF > MyADASApp.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>MyADASApp</string>
              <key>CFBundleIdentifier</key>
              <string>com.user.MyADASApp</string>
              <key>CFBundleName</key>
              <string>MyADASApp</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>17.0</string>
          </dict>
          </plist>
          EOF
          
          # 拷贝你的 YOLO 模型
          cp -r Sources/yolov8s.mlpackage MyADASApp.app/

      - name: Final Zip to IPA
        run: |
          mkdir -p Payload
          cp -r MyADASApp.app Payload/
          zip -vr MyADASApp.ipa Payload/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyADASApp-iOS26-PureBinary
          path: MyADASApp.ipa
