name: Build MyADASApp IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15 # 使用最新的 macOS 15 包含 Xcode 16
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build Archive
        run: |
          # 核心修复：添加 COREML_CODEGEN_LANGUAGE=Swift 强制模型生成 Swift 代码
          xcodebuild archive \
            -scheme MyADASApp_Swift \
            -destination "generic/platform=iOS" \
            -archivePath ./build/MyADASApp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COREML_CODEGEN_LANGUAGE=Swift \
            clean

      - name: Create IPA (TrollStore Compatible)
        run: |
          # 创建 Payload 文件夹并提取 .app
          mkdir -p Payload
          
          # 动态查找生成的 .app 文件位置
          APP_PATH=$(find ./build/MyADASApp.xcarchive -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "错误：无法在 Archive 中找到 .app 文件！"
            exit 1
          fi
          
          echo "正在拷贝应用程序从: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          
          # 压缩成 IPA
          zip -vr MyADASApp.ipa Payload/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyADASApp-v1.0-TrollStore
          path: MyADASApp.ipa
          retention-days: 7
