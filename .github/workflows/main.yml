name: Build FSD V4 ADAS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true # 强制拉取大文件 (如果是通过 Git LFS 上传的模型)

      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Create Info.plist
        run: |
          cat <<EOF > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>NSCameraUsageDescription</key><string>用于AI实时识别路况</string>
              <key>NSLocationWhenInUseUsageDescription</key><string>用于计算行驶速度</string>
              <key>NSMotionUsageDescription</key><string>用于3D路径姿态修正</string>
              <key>CFBundleExecutable</key><string>MyADASApp_Swift</string>
              <key>CFBundleIdentifier</key><string>com.fsd.v4.adas</string>
              <key>CFBundleName</key><string>FSD V4 ADAS</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>4.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>UILaunchScreen</key><dict/>
          </dict>
          </plist>
          EOF

      - name: Build for iPhone Device
        run: |
          # 1. 清理环境
          swift package clean
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # 2. 执行编译
          # 注意：为了确保模型编译，我们不添加任何过滤参数
          swift build -c release \
            --triple arm64-apple-ios17.0 \
            -Xswiftc -sdk -Xswiftc "$SDK_PATH" \
            -Xcc -isysroot -Xcc "$SDK_PATH" \
            -Xcc --target=arm64-apple-ios17.0 \
            -Xlinker -sectcreate -Xlinker __TEXT -Xlinker __info_plist -Xlinker Info.plist

      - name: Package as IPA
        run: |
          mkdir -p Payload/MyADASApp_Swift.app
          
          # 1. 查找二进制文件
          BINARY_PATH=$(find .build -type f -name "MyADASApp_Swift" | grep "release" | head -n 1)
          echo "Binary found at: $BINARY_PATH"
          cp "$BINARY_PATH" Payload/MyADASApp_Swift.app/MyADASApp_Swift
          chmod +x Payload/MyADASApp_Swift.app/MyADASApp_Swift
          
          # 2. 拷贝 Info.plist
          cp Info.plist Payload/MyADASApp_Swift.app/Info.plist
          
          # 3. 强制搜寻并拷贝 AI 模型 (核心修正)
          echo "--- Debug: Searching for compiled models (.mlmodelc) ---"
          find .build -name "*.mlmodelc"
          
          # 拷贝所有编译好的模型文件夹到 App 根目录
          find .build -name "*.mlmodelc" -exec cp -r {} Payload/MyADASApp_Swift.app/ \;
          
          # 兜底方案：如果没找到编译后的 .mlmodelc，则直接从源码拷贝原始 .mlpackage
          # 这是为了防止 SPM 在命令行环境下跳过模型编译阶段
          if [ ! -d Payload/MyADASApp_Swift.app/*.mlmodelc ]; then
            echo "⚠️ Warning: No .mlmodelc found in .build. Copying raw .mlpackage from Sources."
            cp -r Sources/yolov8l.mlpackage Payload/MyADASApp_Swift.app/
          fi
          
          # 4. 检查最终 App 大小 (必须看到几十MB以上才正常)
          echo "--- Final App Bundle Content ---"
          ls -R Payload/MyADASApp_Swift.app
          echo "--- Total Size ---"
          du -sh Payload/MyADASApp_Swift.app
          
          # 5. 打包为 IPA
          zip -r MyADASApp_Swift.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FSD-ADAS-Package
          path: MyADASApp_Swift.ipa
          if-no-files-found: error
