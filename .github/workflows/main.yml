name: Build MyADASApp IPA (Ultimate Recovery)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build Project
        run: |
          # 强制清理并编译，不进行签名验证
          xcodebuild build \
            -scheme MyADASApp_Swift \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COREML_CODEGEN_LANGUAGE=Swift \
            clean

      - name: Locate and Package IPA
        run: |
          mkdir -p Payload
          
          echo "开始全盘搜索 .app 编译产物..."
          # 核心修复：不带路径前缀，搜索所有编译出的 .app 文件夹
          APP_PATH=$(find ./DerivedData -name "*.app" -type d -not -path "*.xcarchive*" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "错误：全盘搜索依然找不到 .app！以下是目录结构，请检查："
            find ./DerivedData -maxdepth 4
            exit 1
          fi
          
          echo "成功捕获产物：$APP_PATH"
          cp -r "$APP_PATH" Payload/
          
          # 创建 IPA
          zip -vr MyADASApp.ipa Payload/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyADASApp-iOS26-Final
          path: MyADASApp.ipa
