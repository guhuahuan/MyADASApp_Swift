name: FSD V4.0 PRODUCTION MASTER BUILD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true # 关键：必须拉取 LFS 中的 weights 文件夹

      - name: Setup Info.plist (ADAS Specific)
        run: |
          cat <<EOF > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>MyADASApp_Swift</string>
              <key>CFBundleIdentifier</key><string>com.fsd.v4.master</string>
              <key>CFBundleName</key><string>FSD MASTER</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>4.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>MinimumOSVersion</key><string>17.0</string>
              
              <key>NSCameraUsageDescription</key><string>需要相机进行 AI 环境感知与碰撞预警</string>
              <key>NSLocationWhenInUseUsageDescription</key><string>需要 GPS 数据计算实时车速与航向</string>
              <key>NSMotionUsageDescription</key><string>需要陀螺仪数据进行 3D 轨迹 AR 修正</string>
              
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UIInterfaceOrientation</key>
              <string>UIInterfaceOrientationLandscapeRight</string>
              
              <key>UILaunchScreen</key><dict/>
          </dict>
          </plist>
          EOF

      - name: Build Swift Binary
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          swift build -c release \
            --triple arm64-apple-ios17.0 \
            -Xswiftc -sdk -Xswiftc "$SDK_PATH" \
            -Xcc -isysroot -Xcc "$SDK_PATH" \
            -Xlinker -sectcreate -Xlinker __TEXT -Xlinker __info_plist -Xlinker Info.plist

      - name: Compile and Assemble IPA
        run: |
          # 1. 初始化目录
          rm -rf Payload
          mkdir -p Payload/MyADASApp_Swift.app
          
          # 2. 拷贝二进制
          BIN=$(find .build -type f -name "MyADASApp_Swift" | grep "release" | head -n 1)
          cp "$BIN" Payload/MyADASApp_Swift.app/MyADASApp_Swift
          chmod +x Payload/MyADASApp_Swift.app/MyADASApp_Swift
          
          # 3. 寻找源码模型 (排除 .build 目录的干扰)
          RAW_MODEL=$(find . -name "*.mlmodel" -not -path "./.build/*" | head -n 1)
          if [ -z "$RAW_MODEL" ]; then
            echo "❌ Error: Source .mlmodel not found in repository!"
            exit 1
          fi
          
          # 4. 编译模型并强制更名
          # 这样无论你模型叫什么，App 内部都统一使用 yolov8l.mlmodelc
          echo "🚀 Compiling $RAW_MODEL ..."
          mkdir -p temp_compile
          xcrun coremlcompiler compile "$RAW_MODEL" temp_compile/
          
          COMPILED_DIR=$(find temp_compile -name "*.mlmodelc" -type d | head -n 1)
          cp -r "$COMPILED_DIR" Payload/MyADASApp_Swift.app/yolov8l.mlmodelc
          
          # 5. 补充配置
          cp Info.plist Payload/MyADASApp_Swift.app/
          
          # 6. 打包
          zip -r FSD_V4_Production.ipa Payload
          echo "✅ Final IPA Size: $(du -sh FSD_V4_Production.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FSD-V4-Production-IPA
          path: FSD_V4_Production.ipa
