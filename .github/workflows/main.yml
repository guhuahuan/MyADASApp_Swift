name: Build MyADASApp IPA (SwiftPM Expert Mode)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build with Swift Package Manager
        run: |
          # 1. 强制使用 Release 配置构建
          # 2. 指定 triple 确保是 iOS 真机环境
          swift build -c release --triple arm64-apple-ios17.0

      - name: Locate and Package IPA
        run: |
          mkdir -p Payload
          
          echo "正在从 SwiftPM 产物目录中提取 .app..."
          # SwiftPM 项目的产物通常在 .build 目录下
          # 我们直接全盘搜索这个刚生成的二进制包
          APP_PATH=$(find .build -name "*.app" -type d | head -n 1)
          
          # 如果 SwiftPM 没生成 .app，我们手动创建一个壳子（这是给 TrollStore 用的关键技巧）
          if [ -z "$APP_PATH" ]; then
            echo "未找到 .app 目录，尝试手动组装包体..."
            EXECUTABLE_PATH=$(find .build -type f -maxdepth 4 -perm +111 -not -path "*/.*" | head -n 1)
            
            mkdir -p MyADASApp.app
            cp "$EXECUTABLE_PATH" MyADASApp.app/MyADASApp
            
            # 拷贝必要的资源文件（模型文件）
            cp Sources/yolov8s.mlpackage MyADASApp.app/ || true
            
            APP_PATH="MyADASApp.app"
          fi
          
          echo "最终打包路径: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -vr MyADASApp.ipa Payload/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyADASApp-iOS26-Final-Ready
          path: MyADASApp.ipa
