name: ADAS-RealApp-Build

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project (project.yml)
        # 动态生成工程配置，零侵入你的代码库
        # Dynamically generate project config, zero intrusion to your codebase
        run: |
          cat <<EOF > project.yml
          name: MyADASApp
          options:
            bundleIdPrefix: com.adas
          targets:
            MyADASApp:
              type: application
              platform: iOS
              deploymentTarget: "17.0"
              sources:
                - path: Sources
              settings:
                CODE_SIGNING_ALLOWED: "NO"
                CODE_SIGNING_REQUIRED: "NO"
                INFOPLIST_KEY_NSCameraUsageDescription: "ADAS System requires camera access for real-time vision."
                INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
          EOF
          xcodegen generate

      - name: Build Unsigned App Container
        run: |
          # 现在我们有了真正的 .xcodeproj，可以直接生成 .app
          # Now we have a real .xcodeproj, capable of outputting a perfect .app
          xcodebuild build \
            -project MyADASApp.xcodeproj \
            -scheme MyADASApp \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./DerivedData

      - name: Locate and Package IPA
        run: |
          # 精确锁定生成的 .app 文件夹
          # Accurately locate the generated .app folder
          APP_PATH=$(find ./DerivedData -name "MyADASApp.app" | grep "Release-iphoneos" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app container still not found!"
            find ./DerivedData -name "*.app"
            exit 1
          fi
          
          echo "Success: Found App at $APP_PATH"
          
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r MyADAS_RealApp
