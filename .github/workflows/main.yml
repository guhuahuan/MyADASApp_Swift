name: ADAS-Simple-Build-v4

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build and Archive
        run: |
          # 1. 自动获取 Scheme
          SCHEME_NAME=$(xcodebuild -list -json | jq -r '.workspace.schemes[0] // .project.schemes[0]')
          echo "Detected Scheme: $SCHEME_NAME"
          
          # 2. 执行归档 (Archive)，这是生成真机包最稳妥的方式
          # 使用 ALLOWED=NO 跳过签名，但生成完整的归档结构
          xcodebuild archive \
            -scheme "$SCHEME_NAME" \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/MyADAS.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            GENERATE_INFOPLIST_FILE=YES \
            INFOPLIST_KEY_NSCameraUsageDescription="我们需要使用摄像头来进行道路目标识别"

      - name: Package IPA
        run: |
          # 3. 定位归档内的 .app 文件夹
          # 在 .xcarchive 结构中，app 路径是非常固定的
          APP_PATH=$(find ./build/MyADAS.xcarchive/Products/Applications -name "*.app" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "错误：归档中未找到 .app 文件！正在列出归档内容进行检查："
            ls -R ./build/MyADAS.xcarchive
            exit 1
          fi
          
          echo "Found App at: $APP_PATH"
          
          # 4. 封装成标准 IPA 格式
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r MyADAS_Simple.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyADAS-Simple-IPA
          path: MyADAS_Simple.ipa
