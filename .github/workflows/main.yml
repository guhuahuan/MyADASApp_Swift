name: Build FSD V4 ADAS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Create Info.plist
        run: |
          cat <<EOF > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>MyADASApp_Swift</string>
              <key>CFBundleIdentifier</key><string>com.fsd.v4.adas</string>
              <key>CFBundleName</key><string>FSD V4 ADAS</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>4.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>MinimumOSVersion</key><string>17.0</string>
              <key>CFBundleSupportedPlatforms</key><array><string>iPhoneOS</string></array>
              <key>DTPlatformName</key><string>iphoneos</string>
              <key>NSCameraUsageDescription</key><string>用于AI实时识别路况</string>
              <key>NSLocationWhenInUseUsageDescription</key><string>用于计算行驶速度</string>
              <key>NSMotionUsageDescription</key><string>用于3D路径姿态修正</string>
              <key>UILaunchScreen</key><dict/>
          </dict>
          </plist>
          EOF

      - name: Build for iPhone Device
        run: |
          swift package clean
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          swift build -c release \
            --triple arm64-apple-ios17.0 \
            -Xswiftc -sdk -Xswiftc "$SDK_PATH" \
            -Xcc -isysroot -Xcc "$SDK_PATH" \
            -Xcc --target=arm64-apple-ios17.0 \
            -Xlinker -sectcreate -Xlinker __TEXT -Xlinker __info_plist -Xlinker Info.plist

      - name: Package as IPA
        run: |
          rm -rf Payload
          mkdir -p Payload/MyADASApp_Swift.app
          
          # 1. 全域搜索二进制文件 (解决路径找不到的问题)
          echo "Searching for binary..."
          BINARY_PATH=$(find .build -type f -name "MyADASApp_Swift" | grep "release" | head -n 1)
          
          if [ -z "$BINARY_PATH" ]; then
            echo "❌ Error: Could not find binary file!"
            exit 1
          fi
          
          cp "$BINARY_PATH" Payload/MyADASApp_Swift.app/MyADASApp_Swift
          chmod 755 Payload/MyADASApp_Swift.app/MyADASApp_Swift
          
          # 2. 拷贝元数据
          cp Info.plist Payload/MyADASApp_Swift.app/Info.plist
          echo "APPL????" > Payload/MyADASApp_Swift.app/PkgInfo
          
          # 3. 强制查找并拷贝 AI 模型 (确保体积正常)
          echo "Searching for compiled models..."
          # 优先查找编译后的 .mlmodelc
          MODEL_PATH=$(find .build -name "*.mlmodelc" -type d | head -n 1)
          
          if [ -n "$MODEL_PATH" ]; then
            echo "Found compiled model at: $MODEL_PATH"
            cp -r "$MODEL_PATH" Payload/MyADASApp_Swift.app/
          else
            echo "⚠️ Warning: .mlmodelc not found, copying raw package from Sources."
            cp -r Sources/yolov8l.mlpackage Payload/MyADASApp_Swift.app/
          fi
          
          # 4. 打印目录结构校验
          echo "--- Final Bundle Contents ---"
          ls -R Payload/MyADASApp_Swift.app
          
          # 5. 打包并检查大小
          zip -r MyADASApp_Swift.ipa Payload
          echo "Final IPA Size:"
          du -sh MyADASApp_Swift.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FSD-ADAS-Package
          path: MyADASApp_Swift.ipa
