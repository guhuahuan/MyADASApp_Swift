name: ADAS-Simple-Build-v3

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build Unsigned App
        run: |
          # 1. 自动获取 Scheme / Auto-detect Scheme
          SCHEME_NAME=$(xcodebuild -list -json | jq -r '.workspace.schemes[0] // .project.schemes[0]')
          echo "Detected Scheme: $SCHEME_NAME"
          
          # 2. 编译并动态生成 Info.plist / Build and auto-generate Info.plist
          xcodebuild build \
            -scheme "$SCHEME_NAME" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            GENERATE_INFOPLIST_FILE=YES \
            INFOPLIST_KEY_NSCameraUsageDescription="我们需要使用摄像头来进行道路目标识别" \
            INFOPLIST_KEY_UILaunchScreen_Generation=YES \
            -derivedDataPath ./DerivedData

      - name: Create IPA Container
        run: |
          # 3. 在编译输出中深度搜索 .app 文件夹 / Search for .app bundle
          APP_PATH=$(find ./DerivedData -name "*.app" | grep "Release-iphoneos" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "错误：未找到编译生成的 .app 文件！ / Error: .app file not found!"
            find ./DerivedData -name "*.app"
            exit 1
          fi
          
          echo "Found App at: $APP_PATH"
          
          # 4. 封装 IPA / Package IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r MyADAS_Simple.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyADAS-Simple-IPA
          path: MyADAS_Simple.ipa
